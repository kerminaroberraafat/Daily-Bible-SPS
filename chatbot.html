<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Bible SPS — المساعد الروحي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --c1: #06b6d4;
      --c2: #8b5cf6;
      --c1d: #0e7490;
      --bg:  #18181b;
      --bg2: #27272a;
      --bg3: #2a2a2e;
      --txt: #fafafa;
      --txt2:#a1a1aa;
      --bdr: #3f3f46;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; min-height: 100vh;
      background: radial-gradient(ellipse at 20% 10%, rgba(6,182,212,.07) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(139,92,246,.07) 0%, transparent 50%), #09090b; }

    /* ── TOGGLER ── */
    #toggler {
      position: fixed; bottom: 28px; left: 28px; z-index: 9999;
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: #fff; font-size: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 0 rgba(6,182,212,.5);
      animation: ring 2.5s ease-in-out infinite;
      transition: transform .2s;
    }
    #toggler:hover { transform: scale(1.1); }
    @keyframes ring {
      0%   { box-shadow: 0 0 0 0   rgba(6,182,212,.5); }
      70%  { box-shadow: 0 0 0 14px rgba(6,182,212,0); }
      100% { box-shadow: 0 0 0 0   rgba(6,182,212,0); }
    }
    #toggler .ico-open  { display: flex; }
    #toggler .ico-close { display: none; }
    #toggler.open .ico-open  { display: none; }
    #toggler.open .ico-close { display: flex; }

    /* ── POPUP ── */
    #popup {
      position: fixed; bottom: 96px; left: 28px; z-index: 9998;
      width: 370px; max-height: 560px;
      background: var(--bg);
      border: 1px solid var(--bdr);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      display: none;
      flex-direction: column;
    }
    #popup.open { display: flex; animation: popIn .25s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn {
      from { opacity:0; transform: scale(.85) translateY(20px); }
      to   { opacity:1; transform: scale(1)  translateY(0); }
    }

    /* ── HEADER ── */
    .hdr {
      background: linear-gradient(135deg, var(--c1d), var(--c2));
      padding: 13px 16px; border-radius: 20px 20px 0 0;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .hdr-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .hdr-title { color: #fff; font-weight: 700; font-size: .95rem; }
    .hdr-sub { color: rgba(255,255,255,.65); font-size: .68rem; display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80;
           box-shadow: 0 0 5px #4ade80; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    #closeBtn {
      background: rgba(255,255,255,.1); border: none; color: #fff;
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    #closeBtn:hover { background: rgba(255,255,255,.25); }

    /* ── MESSAGES ── */
    #msgs {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin; scrollbar-color: var(--bdr) transparent;
    }
    .msg { display: flex; gap: 8px; align-items: flex-end;
           animation: fadeUp .3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg,var(--c1d),var(--c2));
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .bubble {
      max-width: 75%; padding: 9px 13px;
      font-size: .855rem; line-height: 1.65; border-radius: 18px;
    }
    .msg.bot  .bubble { background: var(--bg3); border: 1px solid var(--bdr);
                        color: var(--txt); border-bottom-right-radius: 5px; }
    .msg.user .bubble { background: linear-gradient(135deg,var(--c1d),#075985);
                        color:#fff; border-bottom-left-radius: 5px; }
    .verse-card {
      margin-top: 8px; padding: 8px 11px;
      background: rgba(6,182,212,.08); border-right: 3px solid var(--c1);
      border-radius: 0 10px 10px 0;
      font-family: 'Amiri', serif; font-style: italic;
      font-size: .875rem; color: var(--c1);
    }
    .verse-ref { display:block; margin-top:3px; font-family:'Cairo',sans-serif;
                 font-style:normal; font-size:.68rem; color:var(--txt2); }
    /* typing dots */
    .dots { display:flex; gap:4px; padding: 4px 0; }
    .dots span { width:7px;height:7px;border-radius:50%;background:var(--c1);
                 animation:bounce 1.2s ease-in-out infinite; }
    .dots span:nth-child(2){animation-delay:.2s;}
    .dots span:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

    /* ── CHIPS ── */
    #chips { padding: 0 14px 10px; display:flex; flex-wrap:wrap; gap:6px; flex-shrink:0; }
    .chip {
      padding: 5px 11px; border-radius: 999px; cursor: pointer;
      background: var(--bg3); border: 1px solid #52525b;
      font-family:'Cairo',sans-serif; font-size:.72rem; color:var(--txt2);
      transition: all .2s;
    }
    .chip:hover { border-color:var(--c1); color:var(--c1); background:var(--bg2); }

    /* ── FOOTER ── */
    .ftr { padding: 10px 12px 14px; border-top:1px solid var(--bdr); flex-shrink:0; }
    .form-row {
      display:flex; align-items:flex-end; gap:8px;
      background: var(--bg3); border:1px solid var(--bdr);
      border-radius: 999px; padding: 6px 8px 6px 14px;
      transition: border-color .2s;
    }
    .form-row:focus-within { border-color: var(--c1); }
    #msgInput {
      flex:1; background:none; border:none; outline:none; resize:none;
      font-family:'Cairo',sans-serif; font-size:.875rem; color:var(--txt);
      line-height:1.5; padding:3px 0; max-height:100px;
      scrollbar-width:thin;
    }
    #msgInput::placeholder { color:var(--txt2); }
    #sendBtn {
      width:34px; height:34px; border-radius:50%; border:none; flex-shrink:0;
      background: linear-gradient(135deg,var(--c1),var(--c2));
      color:#fff; font-size:17px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition: transform .2s, opacity .2s;
      opacity:.5; pointer-events:none;
    }
    #sendBtn.active { opacity:1; pointer-events:auto; }
    #sendBtn.active:hover { transform:scale(1.1); }

    /* mobile */
    @media(max-width:480px){
      #popup { left:0;bottom:0;width:100%;border-radius:20px 20px 0 0;max-height:85vh; }
      #toggler { left:16px;bottom:16px; }
    }
  </style>
</head>
<body>

<!-- TOGGLER -->
<button id="toggler" onclick="toggleChat()">
  <span class="ico-open">🕊️</span>
  <span class="ico-close">✕</span>
</button>

<!-- POPUP -->
<div id="popup">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">🕊️</div>
      <div>
        <div class="hdr-title">المساعد الروحي</div>
        <div class="hdr-sub"><span class="dot"></span> Daily Bible SPS</div>
      </div>
    </div>
    <button id="closeBtn" onclick="toggleChat()">✕</button>
  </div>

  <!-- Messages -->
  <div id="msgs">
    <div class="msg bot">
      <div class="avatar">🕊️</div>
      <div class="bubble">أهلاً بيك يا صديقي 🤍<br/>أنا هنا معاك دايماً — شاركني اللي في قلبك 🙏</div>
    </div>
  </div>

  <!-- Chips -->
  <div id="chips">
    <button class="chip" onclick="chip('أنا مضغوط ومحتاج مساعدة')">😓 مضغوط</button>
    <button class="chip" onclick="chip('محتاج آية من الكتاب المقدس تشجعني')">📖 آية</button>
    <button class="chip" onclick="chip('أنا تعبان ومش عارف أكمل')">😔 تعبان</button>
    <button class="chip" onclick="chip('عايز أتأمل في كلام ربنا النهارده')">✨ أتأمل</button>
    <button class="chip" onclick="chip('محتاج تشجيع')">💪 تشجيع</button>
  </div>

  <!-- Footer -->
  <div class="ftr">
    <div class="form-row">
      <textarea id="msgInput" rows="1" placeholder="اكتب رسالتك هنا..."></textarea>
      <button id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>

</div>

<script>
  // ════════════════════════════
  // CONFIG — ضع مفتاحك هنا
  // ════════════════════════════
  const API_KEY = 'AIzaSyC-CZs8pYW54R4OaB3QVaM3V1utRgFbQak';
  const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

  // ════════════════════════════
  // STATE
  // ════════════════════════════
  let history = [
    { role:'user',  parts:[{text:'أنت مساعد روحي وعاطفي لمنصة Daily Bible SPS. تكلم باللهجة المصرية العامية البسيطة. ردودك قصيرة ودافئة. لا تعطي فتاوى دينية. لو الموضوع عميق قل: ممكن تسأل أب اعترافك 🙏. لما تقترح آية اكتبها هكذا: [VERSE]نص الآية|المرجع[/VERSE]. اختم دايماً بجملة إيجابية.'}]},
    { role:'model', parts:[{text:'تمام! أنا هنا أساعدك بأسلوب دافئ وودود 🕊️'}]}
  ];
  let busy = false;

  // ════════════════════════════
  // TOGGLE
  // ════════════════════════════
  function toggleChat() {
    const popup   = document.getElementById('popup');
    const toggler = document.getElementById('toggler');
    const isOpen  = popup.classList.contains('open');
    if (isOpen) {
      popup.classList.remove('open');
      toggler.classList.remove('open');
    } else {
      popup.classList.add('open');
      toggler.classList.add('open');
      scrollBottom();
      document.getElementById('msgInput').focus();
    }
  }

  // ════════════════════════════
  // INPUT LOGIC
  // ════════════════════════════
  const msgInput = document.getElementById('msgInput');
  const sendBtn  = document.getElementById('sendBtn');

  msgInput.addEventListener('input', () => {
    // auto resize
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
    // toggle send button
    sendBtn.classList.toggle('active', msgInput.value.trim().length > 0);
  });

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  function chip(text) {
    document.getElementById('chips').style.display = 'none';
    msgInput.value = text;
    send();
  }

  // ════════════════════════════
  // SEND
  // ════════════════════════════
  function send() {
    if (busy) return;
    const text = msgInput.value.trim();
    if (!text) return;

    // hide chips after first message
    document.getElementById('chips').style.display = 'none';

    // render user bubble
    addBubble('user', text);
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.classList.remove('active');

    // show typing
    const thinkId = addThinking();
    busy = true;

    // push to history & call API
    history.push({ role:'user', parts:[{text}] });
    callAPI(thinkId);
  }

  // ════════════════════════════
  // API
  // ════════════════════════════
  async function callAPI(thinkId) {
    try {
      const res  = await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ contents: history, generationConfig:{temperature:.85,maxOutputTokens:512} })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || 'ماعرفتش أرد 🙏';
      removeThinking(thinkId);
      addBubble('bot', reply);
      history.push({ role:'model', parts:[{text:reply}] });

    } catch(err) {
      history.pop(); // remove failed user msg
      removeThinking(thinkId);
      const msg = err.message?.toLowerCase().includes('api key') || err.message?.includes('API_KEY')
        ? '❌ المفتاح مش صح — تأكد من الـ API Key'
        : `❌ ${err.message || 'مشكلة في الاتصال'}`;
      addBubble('bot', msg, true);
      console.error('API Error:', err);
    } finally {
      busy = false;
    }
  }

  // ════════════════════════════
  // DOM HELPERS
  // ════════════════════════════
  function addBubble(role, text, isErr=false) {
    const msgs = document.getElementById('msgs');
    const div  = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'bot' ? '🕊️' : '🙂';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (isErr) {
      bubble.style.color = '#f87171';
      bubble.innerHTML = esc(text);
    } else if (role === 'bot') {
      bubble.innerHTML = parseReply(text);
    } else {
      bubble.textContent = text;
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    msgs.appendChild(div);
    scrollBottom();
  }

  function addThinking() {
    const msgs = document.getElementById('msgs');
    const id   = 'think_' + Date.now();
    const div  = document.createElement('div');
    div.className = 'msg bot'; div.id = id;
    div.innerHTML = `<div class="avatar">🕊️</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(div);
    scrollBottom();
    return id;
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollBottom() {
    const msgs = document.getElementById('msgs');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function esc(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function parseReply(raw) {
    const vm = raw.match(/\[VERSE\]([\s\S]*?)\|([\s\S]*?)\[\/VERSE\]/);
    if (!vm) return esc(raw).replace(/\n/g,'<br>');
    const before = esc(raw.replace(/\[VERSE\][\s\S]*?\[\/VERSE\]/g,'').trim()).replace(/\n/g,'<br>');
    return `${before ? before+'<br>' : ''}<div class="verse-card">${esc(vm[1].trim())}<span class="verse-ref">${esc(vm[2].trim())}</span></div>`;
  }
</script>
</body>
</html>
