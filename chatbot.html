<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Bible SPS – مساعدك الروحي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #22263a;
      --border:     rgba(255,255,255,0.07);
      --gold:       #c9a84c;
      --gold-soft:  #e8c97a;
      --gold-glow:  rgba(201,168,76,0.18);
      --text:       #e8e3d6;
      --text-muted: #7a7a8a;
      --user-bg:    linear-gradient(135deg, #c9a84c 0%, #a8782a 100%);
      --bot-bg:     #1e2235;
      --radius:     18px;
      --shadow:     0 8px 40px rgba(0,0,0,0.45);
    }

    html, body {
      height: 100%;
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Animated starfield background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(100,80,180,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 16px;
    }

    /* ── Chat card ── */
    .chat-card {
      width: 100%;
      max-width: 680px;
      height: min(780px, calc(100vh - 32px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(201,168,76,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .chat-header {
      padding: 18px 24px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(145deg, #c9a84c, #7a5c18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.25);
    }

    .header-info { flex: 1; }

    .header-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold-soft);
      letter-spacing: 0.3px;
    }

    .header-status {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse-dot 2.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .header-logo {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(201,168,76,0.2);
      border-radius: 4px;
    }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 28px 20px 12px;
      animation: fadeUp 0.6s ease both;
    }

    .welcome-icon {
      font-size: 42px;
      display: block;
      margin-bottom: 12px;
    }

    .welcome h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold-soft);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 340px;
      margin: 0 auto;
    }

    /* ── Message row ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.35s ease both;
    }

    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.bot   { flex-direction: row; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ── */
    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .bot .msg-avatar {
      background: linear-gradient(145deg, #c9a84c, #7a5c18);
      box-shadow: 0 0 0 2px rgba(201,168,76,0.2);
    }

    .user .msg-avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    /* ── Bubble ── */
    .bubble {
      max-width: min(72%, 440px);
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.65;
      word-break: break-word;
    }

    .user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-left-radius: 6px;
      box-shadow: 0 4px 16px rgba(201,168,76,0.22);
    }

    .bot .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border-bottom-right-radius: 6px;
      border: 1px solid var(--border);
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      border-bottom-right-radius: 6px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%           { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Time label ── */
    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    .msg-wrap { display: flex; flex-direction: column; }
    .user .msg-wrap { align-items: flex-end; }
    .bot  .msg-wrap { align-items: flex-start; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 16px 16px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    #userInput {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    #userInput::placeholder { color: var(--text-muted); }

    #userInput:focus {
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }

    .char-count {
      position: absolute;
      bottom: 8px;
      left: 12px;
      font-size: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .char-count.warn { color: #f87171; }

    /* ── Send button ── */
    #sendBtn {
      width: 46px; height: 46px;
      border-radius: 13px;
      background: linear-gradient(145deg, #c9a84c, #9a7020);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      box-shadow: 0 4px 14px rgba(201,168,76,0.3);
    }

    #sendBtn:hover:not(:disabled) {
      transform: scale(1.06);
      box-shadow: 0 6px 20px rgba(201,168,76,0.42);
    }

    #sendBtn:active:not(:disabled) { transform: scale(0.96); }

    #sendBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    #sendBtn svg { width: 20px; height: 20px; fill: #fff; }

    /* ── Footer hint ── */
    .footer-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 12px;
      flex-shrink: 0;
    }

    .suggestion-btn {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      color: var(--gold-soft);
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .suggestion-btn:hover {
      background: var(--gold-glow);
      border-color: var(--gold);
    }

    /* ── Error bubble ── */
    .bubble.error {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      color: #fca5a5;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .app { padding: 0; }
      .chat-card {
        border-radius: 0;
        height: 100dvh;
        max-width: 100%;
      }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="chat-card">

      <!-- Header -->
      <header class="chat-header">
        <div class="header-avatar">✝️</div>
        <div class="header-info">
          <div class="header-name">مساعدك الروحي</div>
          <div class="header-status">
            <span class="status-dot"></span>
            متاح دايمًا للحديث معاك
          </div>
        </div>
        <div class="header-logo">Daily Bible SPS</div>
      </header>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="welcome">
          <span class="welcome-icon">🕊️</span>
          <h2>أهلًا بيك في Daily Bible SPS</h2>
          <p>أنا هنا أساعدك في رحلتك الروحية. اسألني عن الكتاب المقدس، أو شارك معايا أي شيء في قلبك ✨</p>
        </div>
        <div class="divider">ابدأ المحادثة</div>
      </div>

      <!-- Suggestions -->
      <div class="suggestions" id="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">🙏 ابدأ نهارك بآية</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">📖 قصة من الإنجيل</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">💛 محتاج تشجيع</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">🕊️ صلاة بسيطة</button>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-row">
          <div class="input-wrap">
            <textarea
              id="userInput"
              rows="1"
              maxlength="500"
              placeholder="اكتب رسالتك هنا..."
              aria-label="رسالتك"
            ></textarea>
            <span class="char-count" id="charCount">0 / 500</span>
          </div>
          <button id="sendBtn" onclick="sendMessage()" aria-label="إرسال" disabled>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <p class="footer-hint">اضغط Enter للإرسال · Shift+Enter لسطر جديد</p>
      </div>
    </div>
  </div>

  <script>
    /* ─────────────────────────────────────────────
       CONFIG — replace with your actual key
    ───────────────────────────────────────────── */
    const GROQ_API_KEY = "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";
    const MODEL        = "llama3-70b-8192";
    const MAX_CHARS    = 500;

    const SYSTEM_PROMPT = `أنت مساعد روحاني لطيف ومفيد من منصة "Daily Bible SPS" التعليمية الروحية.
تتكلم باللهجة المصرية العامية بأسلوب دافئ وودود وبشوش.
ردودك قصيرة ومفيدة (3-5 جمل كحد أقصى) وتحمل روح التشجيع والأمل.
استخدم الكتاب المقدس كمرجع عند الحاجة.
لا تتحدث عن أي موضوع خارج النطاق الروحاني والكتاب المقدس.`;

    /* ─────────────────────────────────────────────
       DOM refs
    ───────────────────────────────────────────── */
    const messagesEl  = document.getElementById("messages");
    const inputEl     = document.getElementById("userInput");
    const sendBtn     = document.getElementById("sendBtn");
    const charCountEl = document.getElementById("charCount");
    const suggestionsEl = document.getElementById("suggestions");

    let isWaiting = false;

    /* ─────────────────────────────────────────────
       Input handling
    ───────────────────────────────────────────── */
    inputEl.addEventListener("input", () => {
      const len = inputEl.value.length;
      charCountEl.textContent = `${len} / ${MAX_CHARS}`;
      charCountEl.classList.toggle("warn", len > 450);
      sendBtn.disabled = len === 0 || isWaiting;
      autoGrow();
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    function autoGrow() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    }

    /* ─────────────────────────────────────────────
       Suggestions
    ───────────────────────────────────────────── */
    function sendSuggestion(btn) {
      inputEl.value = btn.textContent.replace(/^[^\w\u0600-\u06FF]+/, "").trim();
      inputEl.dispatchEvent(new Event("input"));
      sendMessage();
    }

    function hideSuggestions() {
      if (suggestionsEl) {
        suggestionsEl.style.display = "none";
      }
    }

    /* ─────────────────────────────────────────────
       Append messages
    ───────────────────────────────────────────── */
    function getTime() {
      return new Date().toLocaleTimeString("ar-EG", { hour: "2-digit", minute: "2-digit" });
    }

    function appendMessage(text, role, isError = false) {
      hideSuggestions();
      const row = document.createElement("div");
      row.className = `msg-row ${role}`;

      const avatarText = role === "bot" ? "✝️" : "🙂";
      const errorClass = isError ? " error" : "";

      row.innerHTML = `
        <div class="msg-avatar">${avatarText}</div>
        <div class="msg-wrap">
          <div class="bubble${errorClass}">${escapeHtml(text)}</div>
          <span class="msg-time">${getTime()}</span>
        </div>`;

      messagesEl.appendChild(row);
      scrollToBottom();
      return row;
    }

    function showTyping() {
      const row = document.createElement("div");
      row.className = "msg-row bot";
      row.id = "typing-row";
      row.innerHTML = `
        <div class="msg-avatar">✝️</div>
        <div class="typing-bubble">
          <span></span><span></span><span></span>
        </div>`;
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById("typing-row");
      if (el) el.remove();
    }

    function scrollToBottom() {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "smooth" });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\n/g, "<br>");
    }

    /* ─────────────────────────────────────────────
       Main send function
    ───────────────────────────────────────────── */
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isWaiting) return;

      /* Lock UI */
      isWaiting = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      inputEl.style.height = "auto";
      charCountEl.textContent = `0 / ${MAX_CHARS}`;

      /* Show user bubble */
      appendMessage(text, "user");

      /* Show typing */
      showTyping();

      try {
        const reply = await callGroq(text);
        hideTyping();
        appendMessage(reply, "bot");
      } catch (err) {
        hideTyping();
        appendMessage("حصلت مشكلة بسيطة مش هقدر ارد دلوقتي... جرب تاني 🙏", "bot", true);
        console.error("Groq error:", err);
      } finally {
        isWaiting = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    /* ─────────────────────────────────────────────
       Groq API call
    ───────────────────────────────────────────── */
    async function callGroq(userMessage) {
      const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${GROQ_API_KEY}`
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 400,
          temperature: 0.75,
          messages: [
            { role: "system", content: SYSTEM_PROMPT },
            { role: "user",   content: userMessage }
          ]
        })
      });

      if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        throw new Error(errBody?.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      return data.choices?.[0]?.message?.content?.trim()
        || "مش عارف أرد دلوقتي، جرب تاني 🙏";
    }
  </script>
</body>
</html>
