<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatBot</title>
    <style>
      /* General Styles */
      body {
        font-family: Arial, sans-serif;
        background-color: #121212;
        margin: 0;
        padding: 0;
        color: #fff;
      }

      /* Floating Chat Icon */
      #chatbot-icon {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        background-color: blue;
        color: white;
        font-size: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition: transform 0.2s, background-color 0.2s;
      }

      #chatbot-icon:hover {
        background-color: #b71c1c;
        transform: scale(1.1);
      }

      /* Chatbot Container */
      #chatbot-container {
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: 350px;
        height: 450px;
        background-color: #1f1f1f;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Hide Chatbot Initially */
      .hidden {
        display: none !important;
      }

      /* Chatbot Header */
      #chatbot-header {
        background-color: blue;
        color: white;
        padding: 15px;
        border-top-left-radius: 15px;
        border-top-right-radius: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 18px;
      }

      #close-btn {
        background: none;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
      }

      /* Chatbot Body */
      #chatbot-body {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
      }

      /* Chatbot Messages */
      #chatbot-messages {
        display: flex;
        flex-direction: column;
      }

      .message {
        margin-bottom: 15px;
        padding: 12px;
        border-radius: 8px;
        max-width: 85%;
      }

      .message.user {
        background-color: blue;
        color: white;
        align-self: flex-end;
      }

      .message.bot {
        background-color: #333;
        color: white;
        align-self: flex-start;
      }

      /* Loading Indicator */
      .message.bot.loading {
        background-color: #444;
        font-style: italic;
        color: #ccc;
      }

      /* Input Section */
      #chatbot-input-container {
        display: flex;
        padding: 10px;
        border-top: 1px solid #444;
        background-color: #2c2c2c;
      }

      #chatbot-input {
        flex: 1;
        padding: 10px;
        border: 1px solid #444;
        border-radius: 10px;
        background-color: #333;
        color: white;
      }

      #send-btn {
        margin-left: 10px;
        padding: 10px 15px;
        background-color: blue;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      #send-btn:hover {
        background-color: #b71c1c;
      }
    </style>
  </head>
  <body>
    <div id="chatbot-icon">💬</div>
    <div id="chatbot-container" class="hidden">
      <div id="chatbot-header">
        <span>ChatBot</span>
        <button id="close-btn">&times;</button>
      </div>
      <div id="chatbot-body">
        <div id="chatbot-messages"></div>
      </div>
      <div id="chatbot-input-container">
        <input type="text" id="chatbot-input" placeholder="Type a message" />
        <button id="send-btn">Send</button>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const chatbotContainer = document.getElementById("chatbot-container");
        const closeBtn = document.getElementById("close-btn");
        const sendBtn = document.getElementById("send-btn");
        const chatBotInput = document.getElementById("chatbot-input");
        const chatbotIcon = document.getElementById("chatbot-icon");

        // Open chat
        chatbotIcon.addEventListener("click", () => {
          chatbotContainer.classList.remove("hidden");
          chatbotIcon.style.display = "none";
        });

        // Close chat
        closeBtn.addEventListener("click", () => {
          chatbotContainer.classList.add("hidden");
          chatbotIcon.style.display = "flex";
        });

        // Send message on button click
        sendBtn.addEventListener("click", sendMessage);

        // Send message on Enter key
        chatBotInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") sendMessage();
        });
      });

      async function sendMessage() {
        const inputField = document.getElementById("chatbot-input");
        const userMessage = inputField.value.trim();
        if (!userMessage) return;

        // Clear input and append user message
        inputField.value = "";
        appendMessage("user", userMessage);

        // Show loading indicator
        const loadingId = appendLoadingMessage();

        try {
          const botReply = await getBotResponse(userMessage);
          // Remove loading message and add actual reply
          removeLoadingMessage(loadingId);
          appendMessage("bot", botReply);
        } catch (error) {
          removeLoadingMessage(loadingId);
          let errorMsg = "Sorry, I'm having trouble responding. Please try again.";
          if (error.message === "429") {
            errorMsg = "Too many requests. Please wait a moment and try again.";
          } else if (error.message === "network") {
            errorMsg = "Network error. Please check your connection.";
          }
          appendMessage("bot", errorMsg);
        }
      }

      function appendMessage(sender, message) {
        const messageContainer = document.getElementById("chatbot-messages");
        const messageElement = document.createElement("div");
        messageElement.classList.add("message", sender);
        messageElement.textContent = message;
        messageContainer.appendChild(messageElement);
        messageContainer.scrollTop = messageContainer.scrollHeight;
        return messageElement;
      }

      function appendLoadingMessage() {
        const messageContainer = document.getElementById("chatbot-messages");
        const loadingElement = document.createElement("div");
        loadingElement.classList.add("message", "bot", "loading");
        loadingElement.textContent = "Thinking...";
        loadingElement.id = "loading-" + Date.now();
        messageContainer.appendChild(loadingElement);
        messageContainer.scrollTop = messageContainer.scrollHeight;
        return loadingElement.id;
      }

      function removeLoadingMessage(loadingId) {
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();
      }

      async function getBotResponse(userMessage) {
        const API_KEY = "AIzaSyA_YL-q0JRnvrFi8VLC8osX22nP6bDgO0M";
        // Corrected URL: no space, proper colon
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [
                {
                  parts: [{ text: userMessage }],
                },
              ],
            }),
          });

          if (response.status === 429) {
            throw new Error("429");
          }

          if (!response.ok) {
            throw new Error("network");
          }

          const data = await response.json();

          if (!data.candidates || !data.candidates.length) {
            throw new Error("no_response");
          }

          const botMessage = data.candidates[0].content.parts[0].text;
          return botMessage;
        } catch (error) {
          if (error.message === "429") throw error;
          if (error.message === "network") throw error;
          throw new Error("unknown");
        }
      }
    </script>
  </body>
</html>
